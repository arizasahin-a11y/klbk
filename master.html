<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Sistem Yönetimi | Master</title>
    <script>
        if (window.location.pathname.endsWith('/master.html') || window.location.pathname.endsWith('/master')) {
            window.location.href = '/security_error';
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .action-icon-btn {
            background: var(--primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .action-icon-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .action-icon-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body class="login-body">

    <!-- Background Animation Elements -->
    <div class="bg-shape shape-1"
        style="background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, transparent 70%);"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"
        style="background: radial-gradient(circle, rgba(245,158,11,0.2) 0%, transparent 70%);"></div>

    <div class="login-container">
        <div class="login-card glass-panel" style="border-top: 4px solid var(--primary);">
            <div class="login-header" style="position: relative;">
                <div class="logo-icon" style="background: var(--primary); color: white;">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="header-actions" style="position: absolute; top: 0; right: 0; display: flex; gap: 8px;">
                    <button type="button" id="btnBackupMaster" class="action-icon-btn" title="Veritabanını Yedekle (JSON)">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button type="button" id="btnRestoreMaster" class="action-icon-btn" title="Yedekten Geri Yükle">
                        <i class="fa-solid fa-upload"></i>
                    </button>
                </div>
                <h2>Sistem Yönetimi</h2>
                <p>Yeni okul tanımlama ve kullanıcı oluşturma paneli</p>
            </div>

            <form id="masterForm" class="login-form">
                <div class="form-group" id="newSchoolGroup">
                    <label for="regSchoolNew">Yeni Kurum Adı</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" id="regSchoolNew" name="regSchoolNew"
                            placeholder="Örn: Atatürk Anadolu Lisesi" autocomplete="off" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Admin Şifresi</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPassword" name="regPassword" placeholder="Şifre belirleyin"
                            required>
                    </div>
                </div>

                <div id="masterMessage" class="message-box hidden"></div>

                <button type="submit" id="btnSubmitMaster" class="btn btn-primary btn-block btn-lg">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Okul Oluştur</span>
                </button>

                <button type="button" id="btnShowActivity" class="btn btn-block btn-lg" style="margin-top: 15px; background: #6366f1; color: white;">
                    <i class="fa-solid fa-list-check"></i>
                    <span>Aktivite Seçenekleri (Giriş Logları)</span>
                </button>

                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/k9x7v2m4?logout=true" class="forgot-link" style="color: var(--gray-500);"><i
                            class="fa-solid fa-arrow-left"></i> Giriş Sayfasına Dön</a>
                </div>
            </form>

            <div class="login-footer">
                <p>Kelebek Sınav Sistemi Master Paneli</p>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/master.js?v=2.9"></script>
</body>

</html>
