<!DOCTYPE html>
<html lang="tr">

<head>
    <script>
        (function () {
            const mapping = { 'index.html': 'k9x7v2m4', 'dashboard.html': 'r1p5s8q3', 'master.html': 'n4b9v1c7', 'ogrenci_sorgu.html': 'j2k5l0p8', 'ogretmen.html': 'h6t3y9w1' };
            const pathParts = window.location.pathname.split('/');
            const currentFile = pathParts[pathParts.length - 1] || 'index.html';
            const maskedName = mapping[currentFile];
            const handshake = sessionStorage.getItem('klbk_handshake');
            if (handshake === maskedName) { sessionStorage.removeItem('klbk_handshake'); history.replaceState(null, '', maskedName); }
            else if (maskedName) { document.documentElement.innerHTML = '<body style="font-family:sans-serif; text-align:center; padding-top:100px; background-color:#f8fafc; color:#1e293b;"><h2 style="color:#ef4444;">GEÇERSİZ LİNK. SİZE VERİLEN LİNKİ KULLANIN.</h2></body>'; window.stop(); }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yönetimi | Master</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

    <!-- Background Animation Elements -->
    <div class="bg-shape shape-1"
        style="background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, transparent 70%);"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"
        style="background: radial-gradient(circle, rgba(245,158,11,0.2) 0%, transparent 70%);"></div>

    <div class="login-container">
        <div class="login-card glass-panel" style="border-top: 4px solid var(--primary);">
            <div class="login-header">
                <div class="logo-icon" style="background: var(--primary); color: white;">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <h2>Sistem Yönetimi</h2>
                <p>Yeni okul tanımlama ve kullanıcı oluşturma paneli</p>
            </div>

            <form id="masterForm" class="login-form">
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
                        <label for="regSchoolSelect" style="margin-bottom: 0;">Kurum Adı</label>
                        <a href="#" id="editSchoolNameBtn" class="hidden"
                            style="color: var(--primary); font-size: 0.85rem; text-decoration: none;"><i
                                class="fa-solid fa-pen"></i> İsmi Düzenle</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-school"></i>
                        <select id="regSchoolSelect" name="regSchoolSelect" required
                            style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px 0 45px; font-family: inherit; font-size: 1rem; color: var(--dark); cursor: pointer; outline: none;">
                            <option value="">Yükleniyor...</option>
                        </select>
                    </div>
                </div>

                <div class="form-group hidden" id="newSchoolGroup">
                    <label for="regSchoolNew">Yeni Kurum Adı</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-building"></i>
                        <input type="text" id="regSchoolNew" name="regSchoolNew"
                            placeholder="Örn: Atatürk Anadolu Lisesi" autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regUsername">Hesap Kullanıcı Adı</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="regUsername" name="regUsername" placeholder="Örn: ahmet_hoca" required
                            autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">Hesap Şifresi</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="regPassword" name="regPassword" placeholder="Şifre belirleyin"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEmail">E-Posta Adresi</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="regEmail" name="regEmail" placeholder="Örn: ornek@okul.com"
                            autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regRole">Yetkisi</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-badge"></i>
                        <select id="regRole" name="regRole" required
                            style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px 0 45px; font-family: inherit; font-size: 1rem; color: var(--dark); cursor: pointer; outline: none;">
                            <option value="admin">Admin</option>
                            <option value="idareci">İdareci</option>
                            <option value="ogretmen" selected>Öğretmen</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" id="branchGroup">
                    <label for="regBranch">Branş (Birden fazla seçilebilir)</label>
                    <div class="input-wrapper"
                        style="height: auto; align-items: flex-start; padding-top: 5px; padding-bottom: 5px;">
                        <i class="fa-solid fa-book" style="margin-top: 8px;"></i>
                        <select id="regBranch" name="regBranch" multiple
                            style="width: 100%; height: 100px; border: none; background: transparent; padding: 0 10px 0 45px; font-family: inherit; font-size: 1rem; color: var(--dark); cursor: pointer; outline: none; overflow-y: auto;">
                            <option value="">Lütfen Önce Okul Seçin</option>
                        </select>
                    </div>
                    <small style="color: var(--gray-500); display: block; margin-top: 4px; padding-left: 10px;">
                        <em>* CTRL (Windows) veya CMD (Mac) tuşuna basılı tutarak çoklu seçim yapabilirsiniz.</em>
                    </small>
                </div>

                <div id="masterMessage" class="message-box hidden"></div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Okul Ekle ve Kullanıcı Oluştur</span>
                </button>

                <div style="text-align: center; margin-top: 1rem;">
                    <a href="k9x7v2m4.html" class="forgot-link" style="color: var(--gray-500);"><i
                            class="fa-solid fa-arrow-left"></i> Giriş Sayfasına Dön</a>
                </div>
            </form>

            <div class="login-footer">
                <p>Kelebek Sınav Sistemi Master Paneli</p>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/master.js"></script>
</body>

</html>
