<!DOCTYPE html>
<html lang="tr">

<head>
    <script>
        (function () {
            const mapping = { 'index.html': 'k9x7v2m4', 'dashboard.html': 'r1p5s8q3', 'master.html': 'n4b9v1c7', 'ogrenci_sorgu.html': 'j2k5l0p8', 'ogretmen.html': 'h6t3y9w1' };
            const pathParts = window.location.pathname.split('/');
            const currentFile = pathParts[pathParts.length - 1] || 'index.html';
            const maskedName = mapping[currentFile];
            const handshake = sessionStorage.getItem('klbk_handshake');
            if (handshake === maskedName) { sessionStorage.removeItem('klbk_handshake'); history.replaceState(null, '', maskedName); }
            else if (maskedName) { document.documentElement.innerHTML = '<body style="font-family:sans-serif; text-align:center; padding-top:100px; background-color:#f8fafc; color:#1e293b;"><h2 style="color:#ef4444;">GEÇERSİZ LİNK. SİZE VERİLEN LİNKİ KULLANIN.</h2></body>'; window.stop(); }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Kelebek Sınav Dağıtım Sistemi | Giriş</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

    <!-- Background Animation Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="login-container">
        <div class="login-card glass-panel">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h2>Sınav Dağıtım Sistemi</h2>
                <p>Yönetim paneline giriş yapın</p>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Kullanıcı adınızı girin" required
                            autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Şifre</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Şifrenizi girin" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Beni Hatırla
                    </label>
                    <a href="#" class="forgot-link">Şifremi Unuttum</a>
                </div>

                <div id="loginMessage" class="message-box hidden"></div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <span>Giriş Yap</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            <div class="login-footer">
                <p style="margin-top: 10px; color: var(--gray-400);">Sürüm 1.2 &copy; 2026</p>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
