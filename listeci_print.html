<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste Çıktısı</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="js/core_data_v11_9_1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: #e2e8f0;
        }

        .action-bar {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn {
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-print {
            background: #4f46e5;
            color: white;
        }

        .btn-pdf {
            background: #ef4444;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .page-container {
            width: 210mm; /* A4 width */
            margin: 2rem auto;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .print-page {
            width: 210mm;
            height: 296mm; /* slightly under 297 to avoid overflow */
            padding: 5mm; /* 0.5cm kenar boşlukları */
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
            background: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .print-page:last-child {
            page-break-after: auto;
        }

        .doc-header {
            text-align: center;
            margin-bottom: 25px; /* Bir satırlık boşluk */
            flex-shrink: 0;
        }

        .doc-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
        }

        .table-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .print-table {
            width: 100%;
            height: 100%; /* Stretch to fill available height */
            border-collapse: collapse;
            table-layout: fixed;
            font-size: 10pt; /* smaller font size */
        }

        .print-table th, .print-table td {
            border: 1px solid #000;
            padding: 1px 3px;
            text-align: left;
        }

        .print-table th {
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
        }

        .header-row-1 th { height: 60px; }
        .header-row-2 th { height: 25px; }

        .col-sira { width: 25px; text-align: center !important; }
        .col-alan { width: 35px; text-align: center !important; }
        .col-okulno { width: 45px; text-align: center !important; }
        .col-ad { 
            width: 200px; 
            max-width: 200px;
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .col-blank { width: auto; /* let it distribute evenly */ }

        .rotated-header {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            white-space: nowrap;
        }

        /* Print Media Queries */
        @media print {
            body {
                background: white;
                margin: 0;
                padding: 0;
            }
            .action-bar {
                display: none !important;
            }
            .page-container {
                margin: 0;
                padding: 0;
                box-shadow: none;
                width: 100%;
            }
            @page {
                size: A4 portrait;
                margin: 0; /* Remove browser margins, rely on print-page padding */
            }
        }
    </style>
</head>
<body>

    <div class="action-bar" id="actionBar">
        <div>
            <h2 style="margin: 0; font-size: 1.2rem; color: #1e293b;"><i class="fa-solid fa-file-lines"></i> Liste Önizleme</h2>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Yazdır
            </button>
            <button class="btn btn-pdf" onclick="downloadPDF()">
                <i class="fa-solid fa-file-pdf"></i> PDF İndir
            </button>
        </div>
    </div>

    <!-- The actual A4 page content that will be printed/PDF'd -->
    <div id="pdfContent">
        <div class="page-container" id="pageContainer">
            <!-- Content will be injected here by JS -->
            <div style="text-align: center; margin-top: 50px;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <p>Liste Hazırlanıyor...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await DataManager.initCloud();
                window.schoolData = DataManager.getSchoolSettings();
            } catch (e) {
                console.error("Data fetch error", e);
            }
            generateContent();
        });

        function generateContent() {
            const configStr = localStorage.getItem('listeciConfig');
            if (!configStr) {
                document.getElementById('pageContainer').innerHTML = '<h3 style="color:red; text-align:center;">Hata: Konfigürasyon bulunamadı. Lütfen listeci.html üzerinden seçim yapın.</h3>';
                return;
            }

            const config = JSON.parse(configStr);
            const classesToFetch = config.classes || [];
            const titleSuffix = config.titleSuffix || '';
            const blankColumnsCount = config.blankColumns || 1;
            const mergeClasses = config.mergeClasses || false;

            const allDataStudents = DataManager.getStudents();
            if (!allDataStudents || allDataStudents.length === 0) {
                document.getElementById('pageContainer').innerHTML = '<h3 style="color:red; text-align:center;">Veri Yüklenemedi! (Öğrenci Listesi Boş)</h3>';
                return;
            }

            // Group students by class
            const classGroups = {};
            allDataStudents.forEach(s => {
                if (!classGroups[s.class]) classGroups[s.class] = [];
                classGroups[s.class].push(s);
            });

            const rowsPerPage = 40;
            let pagesHtml = '';

            function formatName(name, surname) {
                let n = (name || '').trim();
                let s = (surname || '').trim();
                let full = (n + ' ' + s).trim();
                
                if (full.length <= 30) return full;
                
                let nameParts = n.split(/\s+/);
                if (nameParts.length > 1) {
                    nameParts[1] = nameParts[1].charAt(0) + '.';
                    n = nameParts.join(' ');
                    full = (n + ' ' + s).trim();
                }
                
                if (full.length > 30 && nameParts.length > 2) {
                    nameParts[2] = nameParts[2].charAt(0) + '.';
                    n = nameParts.join(' ');
                    full = (n + ' ' + s).trim();
                }
                return full;
            }

            function generatePage(title, studentsSubset, startIndex, showAlan) {
                let rowsHtml = '';
                
                // Add 40 rows exactly
                for (let i = 0; i < rowsPerPage; i++) {
                    const s = studentsSubset[i];
                    let blankCells = '';
                    for (let j = 0; j < blankColumnsCount; j++) {
                        blankCells += `<td class="col-blank"></td>`;
                    }

                    if (s) {
                        const alanVal = s.alan || s.track || s.field || s.group || '';
                        const alanTd = showAlan ? `<td class="col-alan">${alanVal}</td>` : '';
                        const formattedName = formatName(s.name, s.surname);
                        
                        rowsHtml += `
                            <tr>
                                <td class="col-sira">${startIndex + i}</td>
                                ${alanTd}
                                <td class="col-okulno">${s.no}</td>
                                <td class="col-ad">${formattedName}</td>
                                ${blankCells}
                            </tr>
                        `;
                    } else {
                        // Empty row
                        const alanTd = showAlan ? `<td class="col-alan"></td>` : '';
                        rowsHtml += `
                            <tr>
                                <td class="col-sira">${startIndex + i}</td>
                                ${alanTd}
                                <td class="col-okulno"></td>
                                <td class="col-ad"></td>
                                ${blankCells}
                            </tr>
                        `;
                    }
                }

                const alanTh = showAlan ? `<th rowspan="2" class="col-alan"><div class="rotated-header">ALAN</div></th>` : '';
                
                let blankHeadersRow2 = '';
                if (blankColumnsCount > 0) {
                    for (let j = 0; j < blankColumnsCount; j++) {
                        blankHeadersRow2 += `<th class="col-blank"></th>`;
                    }
                }

                let colspanAttr = blankColumnsCount > 0 ? `colspan="${blankColumnsCount}"` : '';
                let blankHeadersRow1 = blankColumnsCount > 0 ? `<th ${colspanAttr} style="border-bottom: 1px solid #000;"></th>` : '';

                return `
                    <div class="print-page">
                        <div class="doc-header">
                            <h1 class="doc-title">${title}</h1>
                        </div>
                        <div class="table-container">
                            <table class="print-table">
                                <thead>
                                    <tr class="header-row-1">
                                        <th rowspan="2" class="col-sira"><div class="rotated-header">SIRA</div></th>
                                        ${alanTh}
                                        <th rowspan="2" class="col-okulno"><div class="rotated-header">NUMARA</div></th>
                                        <th rowspan="2" class="col-ad">ÖĞRENCİNİN ADI SOYADI</th>
                                        ${blankHeadersRow1}
                                    </tr>
                                    <tr class="header-row-2">
                                        ${blankHeadersRow2}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            function processStudentList(title, studentList) {
                // Check if any student has an alan
                const hasAlan = studentList.some(s => s.alan || s.track || s.field || s.group);
                
                // Sort
                studentList.sort((a, b) => {
                    if (a.class !== b.class && mergeClasses) {
                        return (a.class || '').localeCompare(b.class || '');
                    }
                    const noA = parseInt(a.no) || 0;
                    const noB = parseInt(b.no) || 0;
                    return noA - noB;
                });

                let html = '';
                for (let i = 0; i < studentList.length; i += rowsPerPage) {
                    const subset = studentList.slice(i, i + rowsPerPage);
                    html += generatePage(title, subset, i + 1, hasAlan);
                }
                if (studentList.length === 0) {
                     html += generatePage(title, [], 1, false);
                }
                return html;
            }

            if (mergeClasses) {
                let allStudents = [];
                classesToFetch.forEach(cls => {
                    if (classGroups[cls]) allStudents.push(...classGroups[cls]);
                });
                let classNamesText = classesToFetch.length > 3 ? "KARMA SINIF" : classesToFetch.join(', ') + " SINIFI";
                let fullTitle = `${classNamesText} ${titleSuffix}`.trim();
                pagesHtml = processStudentList(fullTitle, allStudents);
                document.title = fullTitle;
            } else {
                classesToFetch.forEach(cls => {
                    let students = classGroups[cls] ? [...classGroups[cls]] : [];
                    let fullTitle = `${cls} SINIFI ${titleSuffix}`.trim();
                    pagesHtml += processStudentList(fullTitle, students);
                });
                document.title = `${classesToFetch.join('_')} Liste`;
            }

            document.getElementById('pageContainer').innerHTML = pagesHtml;
        }

        function downloadPDF() {
            const element = document.getElementById('pdfContent');
            const configStr = localStorage.getItem('listeciConfig');
            let filename = 'Liste.pdf';
            if (configStr) {
                const config = JSON.parse(configStr);
                let classNamesText = config.classes.length > 3 ? "KARMA" : config.classes.join('_');
                filename = `${classNamesText}_${config.titleSuffix || 'Liste'}.pdf`.replace(/\s+/g, '_');
            }

            const opt = {
                margin:       0,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            Swal.fire({
                title: 'PDF Hazırlanıyor',
                text: 'Lütfen bekleyin...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            html2pdf().set(opt).from(element).save().then(() => {
                Swal.close();
            }).catch(err => {
                Swal.fire('Hata', 'PDF oluşturulurken bir hata oluştu.', 'error');
                console.error(err);
            });
        }
    </script>
</body>
</html>
